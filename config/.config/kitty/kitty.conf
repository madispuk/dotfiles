# vim:ft=conf
# Kitty Configuration File
# For configuration options, see https://sw.kovidgoyal.net/kitty/conf.html

# set the term to xterm-256color with italic support
term xterm-256color

# END_KITTY_THEME
# Fonts
#
# font_family      MonoLisa Medium
# https://sourcefoundry.org/hack/
font_family      Hack Regular

adjust_line_height 4
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

disable_ligatures never

###########################################################
# Symbols Nerd Font complete symbol_map (v3)
# easily troubleshoot missing/incorrect characters with:
#   kitty --debug-font-fallback
###########################################################

# Nerd Fonts v3 - all symbol ranges
symbol_map U+e000-U+e00a Symbols Nerd Font
symbol_map U+e0a0-U+e0a2,U+e0b0-U+e0b3 Symbols Nerd Font
symbol_map U+e0a3-U+e0a3,U+e0b4-U+e0c8,U+e0ca-U+e0ca,U+e0cc-U+e0d7 Symbols Nerd Font
symbol_map U+e200-U+e2a9 Symbols Nerd Font
symbol_map U+e300-U+e3e3 Symbols Nerd Font
symbol_map U+e5fa-U+e6b5 Symbols Nerd Font
symbol_map U+e700-U+e7c5 Symbols Nerd Font
symbol_map U+ea60-U+ebeb Symbols Nerd Font
symbol_map U+f000-U+f2ff Symbols Nerd Font
symbol_map U+f300-U+f372 Symbols Nerd Font
symbol_map U+f400-U+f533 Symbols Nerd Font
symbol_map U+f500-U+fd46 Symbols Nerd Font
symbol_map U+f0001-U+f1af0 Symbols Nerd Font
symbol_map U+23fb-U+23fe,U+2665,U+26a1,U+2b58 Symbols Nerd Font

# Window
remember_window_size  no # Always open at the configured width and height
initial_window_width  1024
initial_window_height 768

window_padding_width 3.0
# macos_titlebar_color background
macos_show_window_title_in all
macos_thicken_font 0
draw_minimal_borders yes
window_margin_width 0
window_padding_width 5
# set window opacity. Adjust this for readability, if needed.
background_opacity 1
# hide_window_decorations titlebar-only
# tab_bar_margin_height 10

# Mouse
# hide the mouse cursor after a period of time (in seconds)
mouse_hide_wait 1.0
# copy text when selecting with the mouse
copy_on_select yes

# cursor settings
cursor_shape block
shell_integration no-cursor

# If you have specific kitty overrides you'd like to make, you can add them
# to the kitty-overrides.conf file. This file is gitignored, so you won't
# have to worry about accidentally committing your overrides.
include kitty-overrides.conf

# Blank lines for Claude Code
map shift+enter send_text all \e\r

# invoke from cli 'kitten themes' to set the theme
# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
